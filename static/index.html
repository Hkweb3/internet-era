<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>What's Your Internet Era?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow-x:hidden}
    body{font-family:'Inter',sans-serif;background:#050505;color:#fff;min-height:100vh;min-height:100dvh}
    
    .view{display:none;min-height:100vh;min-height:100dvh;flex-direction:column;animation:fadeUp .5s ease}
    .view.active{display:flex}
    
    /* ===== LANDING ===== */
    #landing{align-items:center;justify-content:center;text-align:center;gap:20px;padding:40px 24px;position:relative;overflow:hidden}
    #landing::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.15),transparent 70%);top:-80px;right:-80px;animation:floatBg 8s ease-in-out infinite}
    #landing::after{content:'';position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,.1),transparent 70%);bottom:-60px;left:-60px;animation:floatBg 10s ease-in-out infinite reverse}
    
    .landing-emoji{font-size:4rem;animation:bounce 2s ease infinite;position:relative;z-index:1}
    .landing-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,8vw,3.2rem);font-weight:700;line-height:1.1;position:relative;z-index:1}
    .landing-title .highlight{background:linear-gradient(135deg,#8b5cf6,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gradientShift 3s ease infinite}
    .landing-sub{color:#888;font-size:clamp(.95rem,3.5vw,1.1rem);line-height:1.6;max-width:320px;position:relative;z-index:1}
    .landing-start{background:linear-gradient(135deg,#8b5cf6,#ec4899);border:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;padding:18px 52px;border-radius:60px;cursor:pointer;transition:all .3s;position:relative;z-index:1;box-shadow:0 4px 30px rgba(139,92,246,.3)}
    .landing-start:active{transform:scale(.95)}
    .landing-start:hover{box-shadow:0 8px 40px rgba(139,92,246,.5);transform:translateY(-2px)}
    .landing-footer{color:#333;font-size:.75rem;position:relative;z-index:1;margin-top:auto}
    .landing-traits{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;max-width:280px}
    .trait-tag{background:#111;border:1px solid #222;padding:6px 12px;border-radius:20px;font-size:.75rem;color:#666}
    
    /* ===== QUIZ ===== */
    #quiz{padding:24px;max-width:480px;margin:0 auto}
    .quiz-header{position:sticky;top:0;background:rgba(5,5,5,.9);backdrop-filter:blur(20px);padding:16px 0 20px;z-index:10}
    .q-counter{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:600;color:#8b5cf6;margin-bottom:12px}
    .progress-track{width:100%;height:4px;background:#1a1a1a;border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#ec4899);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    
    .question-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;animation:fadeUp .4s ease}
    .q-text{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.3rem,5vw,1.7rem);font-weight:600;line-height:1.35;margin-bottom:32px}
    
    .option{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:18px 20px;margin-bottom:12px;font-size:.95rem;line-height:1.45;color:#ddd;cursor:pointer;transition:all .2s;text-align:left;font-family:'Inter',sans-serif;position:relative;overflow:auto}
    .option:hover{border-color:#333;background:#161616}
    .option:active{transform:scale(.98)}
    .option.picked{border-color:#8b5cf6;background:rgba(139,92,246,.08);color:#fff}
    .option.slide-out{animation:slideOut .3s ease forwards}
    
    .option-letter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1px solid #333;font-size:.7rem;color:#555;margin-right:12px;flex-shrink:0;font-weight:600;transition:all .2s}
    .option.picked .option-letter{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
    
    /* ===== LOADING ===== */
    #loading{align-items:center;justify-content:center;text-align:center;gap:32px;padding:40px 24px}
    .loading-orb{width:80px;height:80px;border-radius:50%;background:conic-gradient(from 0deg,#8b5cf6,#ec4899,#f59e0b,#8b5cf6);animation:spin 1.5s linear infinite;display:flex;align-items:center;justify-content:center}
    .loading-orb::after{content:'';width:64px;height:64px;border-radius:50%;background:#050505}
    .loading-msg{color:#888;font-size:1rem;animation:pulse 1.5s ease-in-out infinite;line-height:1.5}
    .loading-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:600;color:#fff;margin-top:8px}
    
    /* ===== RESULTS ===== */
    #results{padding:24px;max-width:480px;margin:0 auto;gap:16px;align-items:stretch}
    .result-card{background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:28px 24px;animation:fadeUp .6s ease both}
    .result-card:nth-child(2){animation-delay:.1s}
    .result-card:nth-child(3){animation-delay:.2s}
    .result-card:nth-child(4){animation-delay:.3s}
    .result-card:nth-child(5){animation-delay:.4s}
    
    .era-badge{text-align:center;padding:32px 0 20px}
    .era-emoji{font-size:3.5rem;display:inline-block;animation:bounce 2s ease infinite}
    .era-name{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,6vw,2.2rem);font-weight:700;margin:12px 0 6px;background:linear-gradient(135deg,var(--c1,#8b5cf6),var(--c2,#ec4899));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .era-tagline{color:#999;font-style:italic;font-size:.95rem;line-height:1.4}
    
    .era-desc{color:#ccc;font-size:.95rem;line-height:1.6;margin-top:4px}
    .aesthetic-banner{margin-top:16px;padding:14px 18px;border-radius:12px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.12);font-size:.9rem;color:#a5b4fc;text-align:center;font-style:italic;line-height:1.5}
    
    .section-label{color:#555;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;font-weight:600}
    
    .trait-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .trait-lbl{width:80px;font-size:.8rem;color:#888;text-align:right;flex-shrink:0}
    .trait-track{flex:1;height:6px;background:#1a1a1a;border-radius:6px;overflow:hidden}
    .trait-fill{height:100%;border-radius:6px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
    .trait-val{width:30px;font-size:.75rem;color:#555;font-weight:600}
    
    .roast-text{color:#f9a8d4;font-size:.95rem;line-height:1.5;margin-top:4px}
    .horoscope-text{color:#a5b4fc;font-size:.95rem;line-height:1.5;margin-top:4px}
    .advice-text{color:#fde68a;font-size:.95rem;line-height:1.5;margin-top:4px}
    
    .spirit-row{display:flex;justify-content:space-around;text-align:center;padding:8px 0}
    .spirit-item .spirit-lbl{font-size:.7rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .spirit-item .spirit-val{font-size:1rem;color:#ddd}
    
    /* Share Card Canvas */
    .share-card{background:#0a0a0a;border:1px solid #222;border-radius:20px;overflow:hidden;position:relative}
    .share-card-inner{padding:28px 24px;background:var(--card-gradient)}
    .share-card-inner .sc-emoji{font-size:2.5rem;text-align:center}
    .share-card-inner .sc-name{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;text-align:center;margin:8px 0;color:#fff}
    .share-card-inner .sc-tagline{text-align:center;color:rgba(255,255,255,.65);font-style:italic;font-size:.85rem;margin-bottom:16px}
    .share-card-inner .sc-roast{background:rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;font-size:.8rem;color:rgba(255,255,255,.85);line-height:1.4}
    .share-card-inner .sc-footer{text-align:center;margin-top:12px;font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:1px}
    
    .share-actions{display:flex;gap:12px;justify-content:center;padding:10px 0 40px;flex-wrap:wrap}
    .share-btn{padding:14px 32px;border-radius:50px;border:none;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s}
    .share-btn.primary{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;box-shadow:0 4px 20px rgba(139,92,246,.3)}
    .share-btn.secondary{background:#161616;color:#888;border:1px solid #222}
    .share-btn:active{transform:scale(.95)}
    .retake-link{background:none;border:none;color:#444;font-size:.85rem;cursor:pointer;padding:8px;font-family:'Inter',sans-serif}
    .retake-link:hover{color:#888}
    
    /* Notification toast */
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
    .toast.show{opacity:1}
    
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideOut{to{opacity:0;transform:translateX(80px) rotate(4deg)}}
    @keyframes floatBg{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,20px) scale(1.1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* Hidden canvas for share card */
    #share-canvas{display:none}
  </style>
</head>
<body>
<!-- LANDING -->
<div id="landing" class="view active">
  <div class="landing-emoji">📡</div>
  <h1 class="landing-title">What's Your<br><span class="highlight">Internet Era?</span></h1>
  <p class="landing-sub">8 questions to diagnose your relationship with the internet. Be honest. The algorithm is lying anyway.</p>
  <div class="landing-traits">
    <span class="trait-tag">👻 Ghost</span>
    <span class="trait-tag">📜 Doomscroller</span>
    <span class="trait-tag">✨ Delulu</span>
    <span class="trait-tag">🤖 Algorithm'd</span>
    <span class="trait-tag">🔖 Archivist</span>
    <span class="trait-tag">📺 Parasocial</span>
    <span class="trait-tag">🌸 Cottagecore</span>
    <span class="trait-tag">🎙️ Podcaster</span>
  </div>
  <button class="landing-start" id="start-btn">find your era →</button>
  <p class="landing-footer">no data stored • takes ~60 seconds<br>made for the chronically online</p>
</div>

<!-- QUIZ -->
<div id="quiz" class="view">
  <div class="quiz-header">
    <div class="q-counter" id="q-counter"></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="question-wrap" id="question-wrap"></div>
</div>

<!-- LOADING -->
<div id="loading" class="view">
  <div class="loading-orb"></div>
  <div class="loading-msg" id="loading-msg"></div>
  <div class="loading-name" id="loading-name"></div>
</div>

<!-- RESULTS -->
<div id="results" class="view"></div>

<!-- SHARE CARD CANVAS -->
<canvas id="share-canvas"></canvas>

<div class="toast" id="toast"></div>

<script>
const API = '/api/analyze';

const loadingMessages = [
  "analyzing your digital footprint...",
  "comparing your habits to 10,000 others...",
  "checking your screen time (it's bad)...",
  "consulting the algorithm overlords...",
  "reading your search history...",
  "determining your era of the internet...",
  "this might hurt a little...",
  "generating your roast...",
  "cross-referencing with your FYP..."
];

let currentQ = 0;
let answers = [];
let name = '';
let quizResult = null;

// LANDING -> QUIZ
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('landing').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  renderQuestion();
});

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const wrap = document.getElementById('question-wrap');
  document.getElementById('q-counter').textContent = `question ${currentQ + 1} of 8`;
  document.getElementById('progress-fill').style.width = ((currentQ) / 8 * 100) + '%';
  
  const letters = ['A','B','C','D'];
  wrap.innerHTML = `
    <p class="q-text">${q.question}</p>
    ${q.options.map((o, i) => `<button class="option" data-i="${i}" onclick="pickOption(this, ${i})">
      <span class="option-letter">${letters[i]}</span>${o.text}
    </button>`).join('')}
  `;
}

function pickOption(btn, idx) {
  const options = document.querySelectorAll('.option');
  
  // Animate selection
  btn.classList.add('picked');
  setTimeout(() => {
    options.forEach(o => o.classList.add('slide-out'));
    setTimeout(() => {
      answers.push(idx);
      currentQ++;
      if (currentQ < 8) {
        renderQuestion();
      } else {
        showLoading();
      }
    }, 300);
  }, 200);
}

function showLoading() {
  document.getElementById('quiz').classList.remove('active');
  const loading = document.getElementById('loading');
  
  // Ask for name during loading
  const msgEl = document.getElementById('loading-msg');
  const nameEl = document.getElementById('loading-name');
  
  let msgIndex = 0;
  msgEl.textContent = loadingMessages[0];
  
  const rotateMessages = setInterval(() => {
    msgIndex = (msgIndex + 1) % loadingMessages.length;
    msgEl.textContent = loadingMessages[msgIndex];
  }, 2000);
  
  loading.classList.add('active');
  
  // Send answers to backend
  fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({answers: answers, name: ''})
  })
  .then(r => r.json())
  .then(data => {
    clearInterval(rotateMessages);
    showResults(data);
  })
  .catch(err => {
    console.error(err);
    clearInterval(rotateMessages);
    showResults(null);
  });
}

function showResults(data) {
  document.getElementById('loading').classList.remove('active');
  const results = document.getElementById('results');
  results.classList.add('active');
  
  if (!data) {
    results.innerHTML = `
      <div class="result-card" style="text-align:center">
        <h2 style="margin-bottom:12px">Something went wrong</h2>
        <p style="color:#888;margin-bottom:20px">Couldn't connect to the vibe machine.</p>
        <button class="landing-start" onclick="location.reload()" style="padding:14px 32px;font-size:1rem">try again</button>
      </div>`;
    return;
  }
  
  quizResult = data;
  
  // Calculate percentage for traits
  const maxScore = Math.max(...Object.values(data.scores)) || 1;
  const traitEntries = Object.entries(data.scores);
  
  // Build result HTML
  results.innerHTML = `
    <div class="era-badge">
      <div class="era-emoji">${data.emoji}</div>
      <div class="era-name" style="--c1:${data.colors[0]};--c2:${data.colors[1]}">${data.name}</div>
      <div class="era-tagline">"${data.tagline}"</div>
    </div>
    
    <div class="result-card">
      <div class="section-label">your diagnosis</div>
      <p class="era-desc">${data.description}</p>
      <div class="aesthetic-banner">${data.aesthetic}</div>
    </div>
    
    <div class="result-card">
      <div class="section-label">trait breakdown</div>
      ${traitEntries.map(([label, score]) => {
        const pct = Math.round((score / maxScore) * 100);
        const hue = getHue(label);
        return `<div class="trait-row">
          <span class="trait-lbl">${label}</span>
          <div class="trait-track"><div class="trait-fill" style="background:${hue}" data-pct="${pct}"></div></div>
          <span class="trait-val">${pct}</span>
        </div>`;
      }).join('')}
    </div>
    
    <div class="spirit-row" style="padding: 8px 16px;">
      <div class="spirit-item"><div class="spirit-lbl">Spirit Website</div><div class="spirit-val">${data.spirit_website}</div></div>
      <div class="spirit-item"><div class="spirit-lbl">Spirit Animal</div><div class="spirit-val">${data.spirit_animal}</div></div>
    </div>
    
    <div class="result-card">
      <div class="section-label" style="color:#f9a8d4">🔥 the roast</div>
      <p class="roast-text">${data.roast || 'The algorithm has judged you.'}</p>
    </div>
    
    <div class="result-card">
      <div class="section-label" style="color:#a5b4fc">🔮 your internet horoscope</div>
      <p class="horoscope-text">${data.horoscope || 'Stars aligning in your notifications...'}</p>
    </div>
    
    <div class="result-card">
      <div class="section-label" style="color:#fde68a">🧘 absurd advice</div>
      <p class="advice-text">${data.advice || 'Touch grass. Just once. For the bit.'}</p>
    </div>
    
    <!-- Shareable Card -->
    <div class="section-label" style="margin-top:20px;text-align:center">📸 share your era</div>
    <div class="share-card" id="share-card">
      <div class="share-card-inner" style="--card-gradient:${data.gradient}">
        <div class="sc-emoji">${data.emoji}</div>
        <div class="sc-name">${data.name}</div>
        <div class="sc-tagline">"${data.tagline}"</div>
        <div class="sc-roast">${data.roast || 'The algorithm has judged you.'}</div>
        <div class="sc-footer">WHAT'S YOUR INTERNET ERA? • find yours below ↓</div>
      </div>
    </div>
    <p style="text-align:center;color:#555;font-size:.75rem;margin-top:8px">Long press the card above to save & share</p>
    
    <div class="share-actions">
      <button class="share-btn secondary" onclick="shareText()">copy text result</button>
      <button class="share-btn secondary" onclick="downloadCard()">📸 save card</button>
    </div>
    
    <div style="text-align:center;padding-bottom:40px">
      <button class="retake-link" onclick="location.reload()">↻ take the quiz again</button>
    </div>
  `;
  
  // Animate bars
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.trait-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 400);
  });
}

function getHue(label) {
  const colors = {
    'Doomscroller': '#ff4500',
    'Delulu': '#e040fb',
    'Archivist': '#2ec4b6',
    'Podcaster': '#e94560',
    'Ghost': '#7a7a9a',
    'Parasocial': '#f1c40f',
    'Algorithm\'d': '#00b4d8',
    'Cottagecore': '#d4b483'
  };
  return colors[label] || '#8b5cf6';
}

function shareText() {
  if (!quizResult) return;
  const text = `I'm in my ${quizResult.name} era ${quizResult.emoji}\n"${quizResult.tagline}"\n\nWhat's YOUR internet era?`;
  
  if (navigator.share) {
    navigator.share({text: text}).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard!');
    }).catch(() => {
      showToast('Could not copy');
    });
  }
}

function downloadCard() {
  showToast('Long press the card image above to save it!');
}

const QUESTIONS = [
  {"question":"It's 11 PM. You're in bed. What's actually happening?","options":[{"text":"📱 3 apps open: X, Discord, and something I saved at 6 PM to 'read later'","era":"doomscroll_renaissance"},{"text":"📸 Taking 47th attempt at something aesthetic for tomorrow's post","era":"delulu_influencer"},{"text":"🔖 Found a 25-minute essay. Bookmarked it. Will never read it.","era":"archive_mode"},{"text":"🛌 Actually sleeping. Who am I? A ghost. Nobody's texting me.","era":"ghost_protocol"}]},
  {"question":"A celebrity you follow gets cancelled. Your immediate response?","options":[{"text":"📋 I've already read their entire post history from 2014 and built a timeline","era":"doomscroll_renaissance"},{"text":"💭 'I still stan fr' ... I'm not saying this out loud though","era":"parasocial_peak"},{"text":"🤔 'Hot take: this is nuanced' — already drafting my Substack post","era":"main_character_podcast"},{"text":"💅 Unrelated but this reminds me I have a brand deal to post about","era":"delulu_influencer"}]},
  {"question":"Your screen time app just sent the weekly report. You look and see:","options":[{"text":"⏰ 6h 23m on TikTok. The algorithm showed me one video about sourdough and I've been here since","era":"algorithm_slave"},{"text":"📊 4h 15m but if you count time 'just checking' Instagram, it's more like 8","era":"doomscroll_renaissance"},{"text":"📱 5h and the top app is 'Notes' because I'm writing ideas for content","era":"delulu_influencer"},{"text":"🤔 1h 12m. My screen time app is lying to me or I am dissociating efficiently","era":"ghost_protocol"}]},
