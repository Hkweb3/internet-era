version: '1.0'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/internet-era:$COMMIT_SHA',
      '-f', 'backend/Dockerfile',
      '--cache-from', 'gcr.io/$PROJECT_ID/internet-era:latest',
      '.'
    ]
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/internet-era:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'internet-era',
      '--image', 'gcr.io/$PROJECT_ID/internet-era:$COMMIT_SHA',
      '--platform', 'managed',
      '--region', 'us-central1',
      '--allow-unauthenticated',
      '--set-env-vars', 'OPENROUTER_API_KEY=$$OPENROUTER_API_KEY',
      '--service-account', 'internet-era@$PROJECT_ID.iam.gserviceaccount.com',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--concurrency', '50',
      '--timeout', '60s',
      '--port', '8080',
      '--cpu-throttling'
    ]

timeout: '600s'
